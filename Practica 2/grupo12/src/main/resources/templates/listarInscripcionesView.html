<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Inscripciones</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h1 { color: #004a99; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f0f5fa; color: #004a99; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        a {
            text-decoration: none;
            padding: 10px 15px;
            background-color: #0056b3;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        a:hover { background-color: #003d80; }
        .link-volver { display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Listado de Inscripciones</h1>

    <div th:if="${inscripciones.isEmpty()}">
        <p>No hay inscripciones registradas en el sistema.</p>
    </div>

    <table th:unless="${inscripciones.isEmpty()}">
        <thead>
            <tr>
                <th>DNI Socio Titular</th>
                <th>Número de Familiares</th>
                <th>Cuota Actual (€)</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="insc : ${inscripciones}">
                <td th:text="${insc.socioTitular.dni}">12345678A</td>
                <td th:text="${insc.numeroFamiliares}">0</td>
                <td th:text="${#numbers.formatDecimal(insc.cuota, 1, 2)}">300.00</td>
            </tr>
        </tbody>
    </table>

    <a href="/" class="link-volver">Volver al Inicio</a>

</body>
</html>
