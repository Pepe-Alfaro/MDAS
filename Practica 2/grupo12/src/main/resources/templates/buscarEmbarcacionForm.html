<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Embarcación</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h1 { color: #004a99; }
        form { margin-top: 20px; }
        div { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
        input[type=date] { padding: 5px; }
        button { padding: 10px 15px; background-color: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #003d80; }
        a { display: inline-block; margin-top: 20px; color: #0056b3; }
    </style>
</head>
<body>
    <h1>Buscar Embarcaciones Disponibles</h1>
    
    <form action="/resultadosEmbarcacion" method="GET">
        <div>
            <label for="fechaInicio">Fecha de Inicio:</label>
            <input type="date" id="fechaInicio" name="fechaInicio" required>
        </div>
        <div>
            <label for="fechaFin">Fecha de Fin:</label>
            <input type="date" id="fechaFin" name="fechaFin" required>
        </div>
        <button type="submit">Buscar</button>
    </form>
    
    <a href="/">Volver al Inicio</a>
</body>
</html>
